<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCACGGWUxrlxZtBjzzzOinyz5t9tIR5vDE",
    authDomain: "gestion-ingresos-4a6d0.firebaseapp.com",
    projectId: "gestion-ingresos-4a6d0",
    storageBucket: "gestion-ingresos-4a6d0.firebasestorage.app",
    messagingSenderId: "609140418602",
    appId: "1:609140418602:web:5bff1f2c8ecf2bb195fb53",
  };
  const fbApp = initializeApp(firebaseConfig);
  const fbDb  = getFirestore(fbApp);

  // Exponer en window para que el script principal (no-módulo) lo use
  window.__firebase = { fbDb, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where };
  window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>

  header.app{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
  .card h2{ margin:0 0 4px; font-size:17px; color:var(--blue-dark); }
  .subtitle{ margin:0 0 20px; font-size:13px; color:var(--ink-soft); }

  label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.03em; }
  .field{ margin-bottom:16px; }
  input[type=text],input[type=password],input[type=date],input[type=number],textarea,select{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px;
    font-size:15px; color:var(--ink); background:#FCFCFD; font-family:inherit;
  }
  textarea{ resize:vertical; min-height:70px; }
  input:focus,textarea:focus,select:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(27,75,138,0.12); }

  .estado-toggle{ display:flex; gap:8px; flex-wrap:wrap; }
  .estado-toggle input{ display:none; }
  .estado-toggle label.opt{
    flex:1; min-width:100px; text-transform:none; font-weight:600; font-size:13px;
    border:1px solid var(--line); border-radius:8px; padding:10px 8px;
    text-align:center; cursor:pointer; color:var(--ink-soft); background:#FCFCFD;

  .estado-toggle label.opt.solicitado.active{ border-color:var(--amber); color:var(--amber); background:var(--amber-light); }
  .estado-toggle label.opt.pendiente.active{ border-color:var(--violet); color:var(--violet); background:var(--violet-light); }
  .estado-toggle label.opt.autorizado.active{ border-color:var(--green); color:var(--green); background:var(--green-light); }

  button.primary{ width:100%; padding:13px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:background .12s ease; }
  button.primary:hover{ background:var(--blue-dark); }
  button.primary:disabled{ background:#A9B3AE; cursor:not-allowed; }
  button.secondary{ width:100%; padding:11px; background:transparent; color:var(--blue); border:1px solid var(--line); border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px; }
  button.danger-btn{ width:100%; padding:11px; background:transparent; color:var(--danger); border:1px solid var(--danger); border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px; }

  .error{ background:#FBEAE5; border:1px solid #E3B6A6; color:var(--danger); padding:10px 12px; border-radius:8px; font-size:13.5px; margin-bottom:16px; }
  .success{ background:#E6F4EC; border:1px solid #B9D6C3; color:var(--green); padding:10px 12px; border-radius:8px; font-size:13.5px; margin-bottom:16px; }

  .auth-tabs{ display:flex; gap:6px; margin-bottom:20px; background:#E5E8EE; border-radius:8px; padding:4px; }
  .auth-tabs button{ flex:1; padding:9px; border:none; background:transparent; border-radius:6px; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
  .auth-tabs button.active{ background:#fff; color:var(--blue-dark); box-shadow:0 1px 2px rgba(0,0,0,0.08); }

  .admin-tabs{ display:flex; gap:6px; margin-bottom:20px; background:#E5E8EE; border-radius:8px; padding:4px; flex-wrap:wrap; }
  .admin-tab{ flex:1; min-width:100px; padding:10px 8px; border:none; background:transparent; border-radius:6px; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
  .admin-tab.active{ background:#fff; color:var(--blue-dark); box-shadow:0 1px 2px rgba(0,0,0,0.08); }

  .badge{ display:inline-block; padding:3px 10px; border-radius:99px; font-size:11.5px; font-weight:700; }
  .badge.solicitado{ background:var(--amber-light); color:var(--amber); }
  .badge.pendiente{ background:var(--violet-light); color:var(--violet); }
  .badge.autorizado{ background:var(--green-light); color:var(--green); }

  table.log{ width:100%; border-collapse:collapse; font-size:13.5px; }
  table.log th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); border-bottom:1px solid var(--line); padding:8px 6px; }
  table.log td{ padding:10px 6px; border-bottom:1px solid #ECEEF2; vertical-align:top; }

  .stat-row{ display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
  .stat{ flex:1; min-width:100px; background:#F7F8FA; border:1px solid var(--line); border-radius:8px; padding:12px 14px; }
  .stat .n{ font-size:22px; font-weight:700; color:var(--blue-dark); }
  .stat .l{ font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; }

  .del-btn{ background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:12px; text-decoration:underline; }
  .del-btn:hover{ color:var(--danger); }
  .edit-btn{ background:none; border:none; color:var(--blue); cursor:pointer; font-size:12px; text-decoration:underline; margin-right:8px; }
  .reset-pass-btn{ background:none; border:none; color:var(--amber); cursor:pointer; font-size:12px; text-decoration:underline; margin-right:8px; }

  .empty{ text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:14px; }
  .loading{ text-align:center; padding:60px 20px; color:var(--ink-soft); }
  .admin-select{ margin-bottom:14px; }

  footer.note{ text-align:center; font-size:12px; color:var(--ink-soft); margin-top:30px; line-height:1.6; }

  .notif-banner{
    background: #E6F4EC; border: 1.5px solid #7DC49A; border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 18px;
  }
  .notif-banner .notif-title{ font-weight:700; color:var(--green); font-size:14px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .notif-item{ font-size:13.5px; color:var(--ink); padding:7px 0; border-bottom:1px solid #C3DECE; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .notif-item:last-child{ border-bottom:none; }
  .notif-dismiss{ background:none; border:none; color:var(--green); cursor:pointer; font-size:12px; text-decoration:underline; white-space:nowrap; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .modal{ background:#fff; border-radius:var(--radius); padding:24px; max-width:400px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.18); }
  .modal h3{ margin:0 0 6px; font-size:16px; color:var(--blue-dark); }
  .modal .subtitle{ margin:0 0 18px; }

  .firma{ font-size:13px; color:var(--ink-soft); margin: 2px 0 18px; }
  .firma strong{ color:var(--ink); }

  .user-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #ECEEF2; gap:8px; }
  .user-row-actions{ display:flex; align-items:center; gap:4px; flex-shrink:0; }

  @media(max-width:480px){
    table.log th:nth-child(4),table.log td:nth-child(4){ display:none; }
  }
</style>

<body>
<div id="root"></div>
<script>
(function(){

  // ── Storage: Firebase Firestore (compartido entre todos los dispositivos) ──
  // Usamos una sola colección "gi_kv" con un documento por "key" (mismo modelo que antes con localStorage)
  function waitFirebase(){
    return new Promise(resolve=>{
      if(window.__firebase) return resolve();
      window.addEventListener('firebase-ready', ()=>resolve(), {once:true});
    });
  }

  async function dbGet(key){
    await waitFirebase();
    const {fbDb,doc,getDoc} = window.__firebase;
    try{
      const snap = await getDoc(doc(fbDb,'gi_kv',key));
      if(!snap.exists()) return null;
      const d = snap.data();
      return d && 'v' in d ? JSON.parse(d.v) : null;
    }catch(e){ console.error('dbGet error',key,e); return null; }
  }
  async function dbSet(key,value){
    await waitFirebase();
    const {fbDb,doc,setDoc} = window.__firebase;
    try{ await setDoc(doc(fbDb,'gi_kv',key),{v:JSON.stringify(value)}); return true; }
    catch(e){ console.error('dbSet error',key,e); return false; }
  }
  async function dbDelete(key){
    await waitFirebase();
    const {fbDb,doc,deleteDoc} = window.__firebase;
    try{ await deleteDoc(doc(fbDb,'gi_kv',key)); return true; }
    catch(e){ console.error('dbDelete error',key,e); return false; }
  }
  async function dbListUsers(){
    await waitFirebase();
    const {fbDb,collection,getDocs} = window.__firebase;
    try{
      const snap = await getDocs(collection(fbDb,'gi_kv'));
      const out=[];
      snap.forEach(d=>{ if(d.id.startsWith('gi_user:')) out.push(d.id.replace('gi_user:','')); });
      return out;
    }catch(e){ console.error('dbListUsers error',e); return []; }
  }
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));

  // EmailJS config
  const EMAILJS_SERVICE  = 'service_s3azq4h';
  const EMAILJS_TEMPLATE = 'template_fgstxlw';
  const EMAILJS_PUBKEY   = 'u9ber6m9QP6rhTgZf';

  // Técnicos por defecto (se pueden editar desde el panel admin)
  const TECNICOS_DEFAULT = [
    {nombre:'Pablo Giarrizzo',          email:'pablo.giarrizzo@tmoviles.com.ar'},
    {nombre:'Ivan Aparicio',            email:'ivan.aparicio@tmoviles.com.ar'},
    {nombre:'Jose Matteo',              email:'jose.matteo@tmoviles.com.ar'},
    {nombre:'Ricardo Sanchez',          email:'ricardo.alejandro.sanchez@tmoviles.com.ar'},
    {nombre:'Julian Vazquez',           email:'julian.vazquez@tmoviles.com.ar'},
    {nombre:'Pablo Guzman',             email:'pablo.fabian.guzman@tmoviles.com.ar'},
    {nombre:'Garcia Fernanda',          email:'mariafernan.garcia@tmoviles.com.ar'},
    {nombre:'Cornero Berrutti Santiago',email:'santiago.cornero@tmoviles.com.ar'},
    {nombre:'Naterro Cesar Luis',       email:'cesar.nattero@tmoviles.com.ar'},
  ];

  let tecnicosCache = null;

  async function loadTecnicos(){
    const r = await dbGet('gi_tecnicos');
    tecnicosCache = r || TECNICOS_DEFAULT;
    return tecnicosCache;
  }

  async function saveTecnicos(list){
    tecnicosCache = list;
    await dbSet('gi_tecnicos', list);
  }

  function getTecnicoEmail(nombre){
    if(!nombre || !tecnicosCache) return null;
    const key = nombre.trim().toLowerCase();
    const found = tecnicosCache.find(t => {
      const tk = t.nombre.trim().toLowerCase();
      return tk === key || key.includes(tk) || tk.includes(key);
    });
    return found ? found.email : null;
  }

  async function sendEmailNotif(entry){
    try{
      emailjs.init(EMAILJS_PUBKEY);
      const toEmail=getTecnicoEmail(entry.tecnico);
      if(!toEmail) return false;
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_email:   toEmail,
        name:       entry.tecnico,
        email:      toEmail,
        sitio:      entry.sitio,
        tarea:      entry.tarea,
        fecha:      fmtDate(entry.fecha),
        from_name:  'Fernanda García',
        time:       new Date().toLocaleString('es-AR'),
      });
      return true;
    }catch(err){
      console.error('EmailJS error:',err);
      return false;
    }
  }
  const TECNICOS_PHONES = {
    'pablo giarrizzo':    '541144942039',
    'ivan aparicio':      '541144150960',
    'jose matteo':        '541155813349',
    'ricardo sanchez':    '541138958920',
    'julian vazquez':     '541140452028',
    'pablo guzman':       '541164956882',
    'garcia fernanda':    '541159431294',
    'fernanda garcia':    '541159431294',
    'cornero berrutti santiago': '541159491192',
    'naterro cesar luis': '541161894375',
  };

  function getTecnicoPhone(nombre){
    if(!nombre) return null;
    const key=nombre.trim().toLowerCase();
    // exact match
    if(TECNICOS_PHONES[key]) return TECNICOS_PHONES[key];
    // partial match
    for(const [k,v] of Object.entries(TECNICOS_PHONES)){
      if(key.includes(k)||k.includes(key)) return v;
    }
    return null;
  }

  function sendWhatsApp(entry){
    const phone=getTecnicoPhone(entry.tecnico);
    if(!phone) return false;
    const msg=`✅ *Ingreso AUTORIZADO*\n\n📍 Sitio: *${entry.sitio}*\n🔧 Tarea: ${entry.tarea}\n📅 Fecha: ${fmtDate(entry.fecha)}\n\nTu solicitud fue autorizada. ¡Ya podés proceder!`;
    const url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    window.open(url,'_blank');
    return true;
  }

  async function hashPass(pass){
    const enc=new TextEncoder().encode(pass+'::gestion-ingresos-salt');
    const buf=await crypto.subtle.digest('SHA-256',enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  let memSession = localStorage.getItem('gi_session') || null;
  let state={
    loading:true, user:null, authTab:'login', authError:'',
    entries:[], formError:'', formSuccess:'', saving:false,
    estado:'solicitado', confirmingDelete:null, confirmingRemove:null,
    empError:'', empSuccess:'', adminSection:'inicio',
    adminViewing:null, exporting:false, editingEntry:null,
    notifs:[], resettingPass:null, resetError:'', resetSuccess:'',
  };
  let allEntriesCache=null;
  let allUsersCache=[];
  let adminEntriesCache={};

  function setState(patch){ state=Object.assign({},state,patch); render(); }
  function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function fmtDate(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return d+'/'+m+'/'+y; }
  const root=document.getElementById('root');

  async function init(){
    await loadTecnicos();
    if(memSession){
      const rec=await dbGet('gi_user:'+memSession);
      if(rec){ state.user={username:memSession,isAdmin:!!rec.isAdmin}; await loadMyEntries(); state.notifs=await dbGet('gi_notifs:'+memSession)||[]; }
    }
    state.loading=false; render();
  }

  async function loadMyEntries(){
    const r=await dbGet('gi_entries:'+state.user.username);
    state.entries=r||[];
  }

  async function handleLogin(u,p){
    u=u.trim();
    if(!u||!p){setState({authError:'Completá usuario y contraseña.'});return;}
    const rec=await dbGet('gi_user:'+u);
    if(!rec){setState({authError:'No existe ese usuario. Registrate primero.'});return;}
    if(await hashPass(p)!==rec.passHash){setState({authError:'Contraseña incorrecta.'});return;}
    memSession=u; localStorage.setItem('gi_session',u); state.user={username:u,isAdmin:!!rec.isAdmin}; state.authError='';
    await loadMyEntries(); state.notifs=await dbGet('gi_notifs:'+u)||[]; render();
  }

  async function handleRegister(u,p,p2){
    u=u.trim();
    if(!u||!p){setState({authError:'Completá nombre de usuario y contraseña.'});return;}
    if(p.length<4){setState({authError:'La contraseña debe tener al menos 4 caracteres.'});return;}
    if(p!==p2){setState({authError:'Las contraseñas no coinciden.'});return;}
    if(await dbGet('gi_user:'+u)){setState({authError:'Ese nombre de usuario ya existe.'});return;}
    const isAdmin=u.toLowerCase()==='admin';
    await dbSet('gi_user:'+u,{username:u,passHash:await hashPass(p),isAdmin});
    memSession=u; localStorage.setItem('gi_session',u); state.user={username:u,isAdmin}; state.authError=''; state.entries=[]; render();
  }

  function handleLogout(){
    memSession=null; localStorage.removeItem('gi_session'); state.user=null; state.entries=[]; state.adminViewing=null;
    state.adminSection='inicio'; allEntriesCache=null; render();
  }

  async function handleSave(data){
    setState({saving:true,formError:'',formSuccess:''});
    if(!data.fecha||!data.sitio||!data.tecnico||!data.tarea){
      setState({saving:false,formError:'Completá todos los campos obligatorios.'});return;
    }
    const entry={
      id:'gi_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      fecha:data.fecha, sitio:data.sitio.trim(), tecnico:data.tecnico.trim(),
      estado:data.estado, tarea:data.tarea.trim(), detalle:data.detalle.trim(),
      cargadoPor:state.user.username, registradoEl:new Date().toISOString(),
    };
    const newEntries=[entry,...state.entries];
    const ok=await dbSet('gi_entries:'+state.user.username,newEntries);
    if(!ok){setState({saving:false,formError:'No se pudo guardar.'});return;}
    state.entries=newEntries;
    if(state.user.isAdmin&&allEntriesCache) allEntriesCache=[Object.assign({},entry,{_owner:state.user.username}),...allEntriesCache];
    setState({saving:false,formSuccess:'Ingreso registrado correctamente.',formError:''});
    setTimeout(()=>setState({formSuccess:''}),3000);
  }

  async function handleDelete(id,username){
    const target=username||state.user.username;
    const rec=await dbGet('gi_entries:'+target);
    const filtered=(rec||[]).filter(e=>e.id!==id);
    await dbSet('gi_entries:'+target,filtered);
    if(target===state.user.username) state.entries=filtered;
    if(allEntriesCache) allEntriesCache=allEntriesCache.filter(e=>e.id!==id);
    setState({confirmingDelete:null});
  }

  async function handleChangeEstado(id,username,nuevoEstado){
    const rec=await dbGet('gi_entries:'+username);
    const updated=(rec||[]).map(e=>e.id===id?Object.assign({},e,{estado:nuevoEstado}):e);
    await dbSet('gi_entries:'+username,updated);
    if(username===state.user.username) state.entries=updated;
    if(allEntriesCache) allEntriesCache=allEntriesCache.map(e=>e.id===id?Object.assign({},e,{estado:nuevoEstado}):e);
    if(nuevoEstado==='autorizado'){
      const entry=updated.find(e=>e.id===id);
      const notifs=await dbGet('gi_notifs:'+username)||[];
      notifs.push({id:'n_'+Date.now(),entryId:id,sitio:entry?entry.sitio:'',tarea:entry?entry.tarea:'',fecha:entry?entry.fecha:'',leido:false,creadoEl:new Date().toISOString()});
      await dbSet('gi_notifs:'+username,notifs);
      // Enviar email de notificación
      if(entry){
        sendEmailNotif(entry).then(ok=>{
          if(ok) console.log('Email enviado a',entry.tecnico);
        });
      }
    }
    setState({editingEntry:null});
  }

  async function loadAllEntries(){
    const usernames=await dbListUsers();
    allUsersCache=usernames.filter(u=>u!==state.user.username);
    const allUsernames=[state.user.username,...allUsersCache];
    const merged=[];
    for(const u of allUsernames){
      const rec=await dbGet('gi_entries:'+u)||[];
      adminEntriesCache[u]=rec;
      rec.forEach(e=>merged.push(Object.assign({},e,{_owner:u})));
    }
    merged.sort((a,b)=>a.fecha<b.fecha?1:(a.fecha>b.fecha?-1:0));
    allEntriesCache=merged;
  }

  async function handleAddEmp(u,p){
    u=(u||'').trim();
    if(!u||!p){setState({empError:'Completá nombre y contraseña.'});return;}
    if(p.length<4){setState({empError:'La contraseña debe tener al menos 4 caracteres.'});return;}
    if(u.toLowerCase()==='admin'){setState({empError:'Ese nombre está reservado.'});return;}
    if(await dbGet('gi_user:'+u)){setState({empError:'Ya existe un usuario con ese nombre.'});return;}
    await dbSet('gi_user:'+u,{username:u,passHash:await hashPass(p),isAdmin:false});
    await dbSet('gi_entries:'+u,[]);
    setState({empError:'',empSuccess:'Usuario "'+u+'" creado correctamente.'});
    await renderAdmin();
  }

  async function handleRemoveEmp(u){
    try{await dbDelete('gi_user:'+u);}catch(e){}
    try{await dbDelete('gi_entries:'+u);}catch(e){}
    delete adminEntriesCache[u];
    if(state.adminViewing===u) state.adminViewing=null;
    if(allEntriesCache) allEntriesCache=allEntriesCache.filter(e=>e._owner!==u);
    state.confirmingRemove=null;
    setState({empSuccess:'Usuario "'+u+'" eliminado.',empError:''});
    await renderAdmin();
  }

  async function handleResetPassword(username, newPass, newPass2){
    if(!newPass || newPass.length < 4){
      setState({resetError:'La contraseña debe tener al menos 4 caracteres.'});return;
    }
    if(newPass !== newPass2){
      setState({resetError:'Las contraseñas no coinciden.'});return;
    }
    const rec = await dbGet('gi_user:'+username);
    if(!rec){setState({resetError:'No se encontró el usuario.'});return;}
    rec.passHash = await hashPass(newPass);
    await dbSet('gi_user:'+username, rec, true);
    setState({resettingPass:null, resetError:'', resetSuccess:'Contraseña de "'+username+'" reseteada correctamente.'});
    setTimeout(()=>setState({resetSuccess:''}), 3500);
  }

    setState({exporting:true});
    if(!allEntriesCache) await loadAllEntries();
    const rows=(allEntriesCache||[]).map(e=>({
      'Usuario':e._owner||e.cargadoPor||'',
      'Fecha':e.fecha,
      'N° Sitio':e.sitio,
      'Técnico':e.tecnico,
      'Estado':e.estado,
      'Tarea a realizar':e.tarea,
      'Detalle':e.detalle,
      'Registrado el':new Date(e.registradoEl).toLocaleString('es-AR'),
    }));
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[{wch:16},{wch:12},{wch:12},{wch:20},{wch:12},{wch:30},{wch:40},{wch:20}];
    const wb=XLSX.utils.book_new();
    wb.Props={Author:'Fernanda García'};
    XLSX.utils.book_append_sheet(wb,ws,'Gestión de Ingresos');
    XLSX.writeFile(wb,'gestion-ingresos-'+new Date().toISOString().slice(0,10)+'.xlsx');
    setState({exporting:false});
  }

  function renderTable(entries,opts){
    opts=opts||{};

    const tot={solicitado:0,pendiente:0,autorizado:0};
    entries.forEach(e=>{if(tot[e.estado]!==undefined)tot[e.estado]++;});
    const rows=entries.map(e=>`
      <tr>
        ${opts.showOwner?`<td>${escHtml(e._owner||'')}</td>`:''}
        <td>${fmtDate(e.fecha)}</td>
        <td>${escHtml(e.sitio)}</td>
        <td>${escHtml(e.tecnico)}</td>
        <td><span class="badge ${e.estado}">${e.estado.charAt(0).toUpperCase()+e.estado.slice(1)}</span></td>
        <td>${escHtml(e.tarea)}</td>
        <td>
          ${opts.allowEdit?`<button class="edit-btn" data-edit-id="${e.id}" data-edit-user="${e._owner||opts.username||''}">Estado</button>`:''}
          ${opts.allowDelete?(
            state.confirmingDelete===e.id
            ?`<button class="confirm-del-yes" data-id="${e.id}" data-user="${e._owner||opts.username||''}" style="color:var(--danger);font-weight:700;background:none;border:none;cursor:pointer;font-size:12px;text-decoration:underline;">Sí</button> <button class="confirm-del-no" style="background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:12px;text-decoration:underline;">No</button>`
            :`<button class="del-btn" data-id="${e.id}" data-user="${e._owner||opts.username||''}">Borrar</button>`
          ):''}
        </td>
      </tr>`).join('');
    return `
      <div class="stat-row">
        <div class="stat"><div class="n" style="color:var(--amber)">${tot.solicitado}</div><div class="l">Solicitado</div></div>
        <div class="stat"><div class="n" style="color:var(--violet)">${tot.pendiente}</div><div class="l">Pendiente</div></div>
        <div class="stat"><div class="n" style="color:var(--green)">${tot.autorizado}</div><div class="l">Autorizado</div></div>
      </div>
      <table class="log">
        <thead><tr>
          ${opts.showOwner?'<th>Usuario</th>':''}
          <th>Fecha</th><th>N° Sitio</th><th>Técnico</th><th>Estado</th><th>Tarea</th><th></th>
        </tr></thead>

                  <div style="flex:1;">
                    <div style="font-size:14px;font-weight:600;">${escHtml(t.nombre)}</div>
                    <div style="font-size:12px;color:var(--ink-soft);">📧 ${escHtml(t.email)}</div>
                  </div>
                  <div class="user-row-actions">
                    ${state.confirmingRemoveTec===i
                      ?`<span style="font-size:12px;color:var(--danger);margin-right:6px;">¿Seguro?</span>
                         <button class="remove-tec-btn" data-tec-idx="${i}" style="color:var(--danger);font-weight:700;background:none;border:none;cursor:pointer;font-size:12px;text-decoration:underline;">Sí, quitar</button>
                         <button class="cancel-tec-btn" style="margin-left:6px;background:none;border:none;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-size:12px;">Cancelar</button>`
                      :`<button class="remove-tec-btn" data-tec-idx="${i}" style="background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:12px;text-decoration:underline;">Quitar</button>`}
                  </div>
                </div>`).join('')}
            </div>
          </div>
        `:''}

        ${section==='registros'?`
          <div class="card">
            <h2>Todos los ingresos del equipo</h2>
            <p class="subtitle">Ves en un solo lugar todo lo cargado. Filtrá por usuario o exportá a Excel.</p>
            <div class="admin-select">
              <select id="userSelect">
                <option value="">— Todos los usuarios —</option>
                <option value="${escHtml(state.user.username)}" ${viewing===state.user.username?'selected':''}>${escHtml(state.user.username)} (yo)</option>
                ${allUsersCache.map(u=>`<option value="${escHtml(u)}" ${viewing===u?'selected':''}>${escHtml(u)}</option>`).join('')}
              </select>
            </div>
            <button class="secondary" id="exportBtn" ${state.exporting?'disabled':''}>${state.exporting?'Generando…':'Exportar a Excel'}</button>
            <div style="margin-top:18px;">
              ${renderTable(visibleEntries,{allowDelete:true,allowEdit:true,showOwner:!viewing})}
            </div>
          </div>
        `:''}

        ${renderModal()}
      </div>`;

    document.getElementById('logoutBtn').onclick=handleLogout;
    root.querySelectorAll('.admin-tab').forEach(btn=>{
      btn.onclick=()=>{ state.adminSection=btn.dataset.section; state.confirmingRemove=null; state.confirmingDelete=null; state.resetSuccess=''; renderAdminView(); };
    });

    if(section==='inicio'){ bindForm(); bindTable(); }

    if(section==='usuarios'){
      document.getElementById('addEmpBtn').onclick=()=>handleAddEmp(document.getElementById('newEmpUser').value,document.getElementById('newEmpPass').value);
      root.querySelectorAll('.reset-pass-btn').forEach(btn=>{
        btn.onclick=()=>setState({resettingPass:btn.dataset.resetUser, resetError:''});
      });
      root.querySelectorAll('.remove-emp-btn').forEach(btn=>{
        btn.onclick=()=>{ const u=btn.dataset.removeUser; if(state.confirmingRemove===u) handleRemoveEmp(u); else setState({confirmingRemove:u}); };
      });
      root.querySelectorAll('.cancel-remove-btn').forEach(btn=>{ btn.onclick=()=>setState({confirmingRemove:null}); });
    }

    if(section==='tecnicos'){
      document.getElementById('addTecBtn').onclick=async()=>{
        const nombre=document.getElementById('newTecNombre').value.trim();
        const email=document.getElementById('newTecEmail').value.trim();
        if(!nombre||!email){setState({tecnicoError:'Completá nombre y email.',tecnicoSuccess:''});renderAdminView();return;}
        if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setState({tecnicoError:'El email no es válido.',tecnicoSuccess:''});renderAdminView();return;}
        const lista=[...(tecnicosCache||[]),{nombre,email}];
        await saveTecnicos(lista);
        setState({tecnicoError:'',tecnicoSuccess:`"${nombre}" agregado correctamente.`,confirmingRemoveTec:null});
        renderAdminView();
        setTimeout(()=>{setState({tecnicoSuccess:''});renderAdminView();},3000);
      };
      root.querySelectorAll('.remove-tec-btn').forEach(btn=>{
        btn.onclick=async()=>{
          const idx=parseInt(btn.dataset.tecIdx);
          if(state.confirmingRemoveTec===idx){
            const lista=(tecnicosCache||[]).filter((_,i)=>i!==idx);
            await saveTecnicos(lista);
            setState({tecnicoError:'',tecnicoSuccess:'Técnico quitado.',confirmingRemoveTec:null});
            renderAdminView();
            setTimeout(()=>{setState({tecnicoSuccess:''});renderAdminView();},3000);
          } else {
            setState({confirmingRemoveTec:idx});
            renderAdminView();
          }
        };
      });
      root.querySelectorAll('.cancel-tec-btn').forEach(btn=>{
        btn.onclick=()=>{setState({confirmingRemoveTec:null});renderAdminView();};
      });
    }

    if(section==='registros'){
      document.getElementById('exportBtn').onclick=handleExport;
      document.getElementById('userSelect').onchange=(e)=>{ state.adminViewing=e.target.value||null; renderAdminView(); };
      bindTable();
    }

    bindModal();
  }

  init();
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</body>
</html>
